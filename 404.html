<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page not found — Sam C.</title>
    <meta name="robots" content="noindex" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lexend:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: "Lexend", sans-serif;
        color: #1a1a1a;
        background: linear-gradient(160deg, #f8f5f2 0%, #e8eef7 100%);
        text-align: center;
        padding: 2rem;
      }
      h1 {
        font-family: "Cinzel", serif;
        font-size: clamp(2rem, 5vw, 3rem);
        margin: 0 0 0.75rem;
        color: #2d5aa0;
      }
      p {
        margin: 0 0 1.75rem;
        max-width: 28rem;
        line-height: 1.6;
        color: #444;
      }
      a {
        display: inline-block;
        background: #1a1a1a;
        color: #fff;
        text-decoration: none;
        padding: 0.75rem 1.5rem;
        border-radius: 0.5rem;
        font-weight: 600;
      }
      a:hover {
        background: #2d5aa0;
      }
      a:focus {
        outline: 2px solid #3a7bd5;
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main id="main-content">
      <h1>404</h1>
      <p>That page does not exist. Head back to the portfolio homepage to keep browsing.</p>
